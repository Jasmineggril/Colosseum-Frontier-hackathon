<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1152" viewBox="0 0 2048 1152">
  <defs>
    <radialGradient id="epic-grad" cx="40%" cy="40%"><stop offset="0%" stop-color="#6d28d9"/><stop offset="50%" stop-color="#4c1d95"/><stop offset="100%" stop-color="#0f172a"/></radialGradient>
    <linearGradient id="neon-beam" x1="0" x2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
    <filter id="glow-fx"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#epic-grad)"/>
  <!-- Nebula clouds -->
  <ellipse cx="300" cy="250" rx="400" ry="300" fill="#7c3aed" opacity="0.12" filter="url(#glow-fx)"/>
  <ellipse cx="1800" cy="600" rx="450" ry="350" fill="#3b82f6" opacity="0.1" filter="url(#glow-fx)"/>
  <!-- Cosmic portal effect (rings) -->
  <circle cx="1024" cy="576" r="400" fill="none" stroke="url(#neon-beam)" stroke-width="12" opacity="0.15"/>
  <circle cx="1024" cy="576" r="350" fill="none" stroke="#06b6d4" stroke-width="8" opacity="0.12"/>
  <circle cx="1024" cy="576" r="300" fill="none" stroke="url(#neon-beam)" stroke-width="6" opacity="0.1"/>
  <!-- Central cathedral light -->
  <circle cx="1024" cy="576" r="200" fill="#fbbf24" opacity="0.08" filter="url(#glow-fx)"/>
  <!-- Particles/stars -->
  <g fill="#fff" opacity="0.5">
    <circle cx="200" cy="150" r="3"/><circle cx="500" cy="300" r="2"/><circle cx="800" cy="200" r="2.5"/>
    <circle cx="1200" cy="250" r="2"/><circle cx="1600" cy="350" r="3"/><circle cx="1900" cy="400" r="2"/>
    <circle cx="250" cy="850" r="2"/><circle cx="900" cy="950" r="2.5"/><circle cx="1600" cy="900" r="2"/>
    <circle cx="1950" cy="1050" r="1.5"/><circle cx="400" cy="1050" r="2"/>
  </g>
  <!-- Title effect -->
  <g filter="url(#glow-fx)">
    <text x="50%" y="60%" font-family="Orbitron, monospace" font-size="84" font-weight="900" fill="#fff" text-anchor="middle" opacity="0.95" letter-spacing="3">THE QUANTUM</text>
    <text x="50%" y="72%" font-family="Orbitron, monospace" font-size="84" font-weight="900" fill="#7c3aed" text-anchor="middle" opacity="0.9" letter-spacing="2">CATHEDRAL</text>
  </g>
</svg>
