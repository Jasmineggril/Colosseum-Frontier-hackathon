<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="rain-sky" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="neon-rain" x1="0.5" x2="0.5" y1="0" y2="1"><stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8"/><stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.2"/></linearGradient>
    <filter id="blur"><feGaussianBlur in="SourceGraphic" stdDeviation="2"/></filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#rain-sky)"/>
  <!-- Neon buildings -->
  <polygon points="150,350 250,200 350,200 350,750 150,750" fill="#ff006e" opacity="0.15"/>
  <polygon points="400,450 480,280 560,280 560,750 400,750" fill="#00d4ff" opacity="0.12"/>
  <polygon points="650,400 750,300 850,300 850,750 650,750" fill="#7c3aed" opacity="0.14"/>
  <!-- Rain effect -->
  <g stroke="url(#neon-rain)" stroke-width="2" opacity="0.6" filter="url(#blur)">
    <line x1="100" y1="0" x2="80" y2="200"/><line x1="180" y1="50" x2="160" y2="250"/><line x1="280" y1="20" x2="260" y2="220"/>
    <line x1="400" y1="0" x2="380" y2="200"/><line x1="520" y1="50" x2="500" y2="250"/><line x1="650" y1="20" x2="630" y2="220"/>
    <line x1="750" y1="0" x2="730" y2="200"/><line x1="850" y1="50" x2="830" y2="250"/><line x1="900" y1="20" x2="880" y2="220"/>
  </g>
  <!-- Hologram glow -->
  <circle cx="250" cy="600" r="80" fill="#00d4ff" opacity="0.08"/>
  <circle cx="750" cy="550" r="100" fill="#ff006e" opacity="0.06"/>
  <text x="50%" y="95%" font-family="Orbitron, monospace" font-size="28" fill="#fff" text-anchor="middle" font-weight="bold" opacity="0.9">Cyber Rain City</text>
</svg>
