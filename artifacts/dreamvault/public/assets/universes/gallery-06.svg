<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="star-glow" cx="50%" cy="50%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#ea580c"/></radialGradient>
    <linearGradient id="cathedral-glow" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#0a0014"/>
  <!-- Dying star -->
  <circle cx="512" cy="300" r="200" fill="url(#star-glow)" opacity="0.8"/>
  <circle cx="512" cy="300" r="180" fill="#ff7f00" opacity="0.4"/>
  <!-- Star corona -->
  <circle cx="512" cy="300" r="220" fill="#fbbf24" opacity="0.08"/>
  <circle cx="512" cy="300" r="250" fill="#ea580c" opacity="0.05"/>
  <!-- Cathedral silhouette orbiting -->
  <polygon points="480,550 520,550 520,700 480,700" fill="url(#cathedral-glow)" opacity="0.7"/>
  <polygon points="460,520 540,520 540,530 460,530" fill="#fbbf24" opacity="0.5"/>
  <!-- Spires -->
  <polygon points="485,530 495,450 505,530" fill="#ea580c" opacity="0.6"/>
  <polygon points="515,530 525,460 535,530" fill="#ea580c" opacity="0.6"/>
  <!-- Debris particles around cathedral -->
  <circle cx="420" cy="600" r="8" fill="#fbbf24" opacity="0.6"/>
  <circle cx="600" cy="620" r="6" fill="#f59e0b" opacity="0.5"/>
  <circle cx="450" cy="700" r="7" fill="#dc2626" opacity="0.5"/>
  <circle cx="580" cy="680" r="5" fill="#ea580c" opacity="0.6"/>
  <!-- Orbital rings -->
  <circle cx="512" cy="600" r="140" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.15"/>
  <ellipse cx="512" cy="600" rx="160" ry="80" fill="none" stroke="#ea580c" stroke-width="1" opacity="0.1"/>
  <text x="50%" y="95%" font-family="Orbitron, monospace" font-size="28" fill="#fff" text-anchor="middle" font-weight="bold" opacity="0.9">Cathedral Orbit</text>
</svg>
