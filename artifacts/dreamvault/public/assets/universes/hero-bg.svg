<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="1080" viewBox="0 0 3840 1080">
  <defs>
    <linearGradient id="hero-grad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1a0b2e"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="60%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#hero-grad)"/>
  <!-- Nebula glows -->
  <ellipse cx="600" cy="200" rx="800" ry="400" fill="url(#glow1)" opacity="0.06"/>
  <ellipse cx="3200" cy="700" rx="900" ry="500" fill="url(#glow2)" opacity="0.05"/>
  <!-- Subtle star field -->
  <g fill="#fff" opacity="0.15">
    <circle cx="300" cy="150" r="2"/><circle cx="800" cy="280" r="1.5"/><circle cx="1400" cy="200" r="2"/>
    <circle cx="2000" cy="400" r="1"/><circle cx="2800" cy="300" r="2.5"/><circle cx="3400" cy="500" r="1.5"/>
    <circle cx="3800" cy="150" r="2"/><circle cx="500" cy="950" r="1.5"/><circle cx="1900" cy="1000" r="1"/>
    <circle cx="3200" cy="950" r="2"/>
  </g>
  <!-- Gradient overlay for depth -->
  <rect width="100%" height="100%" fill="url(linear-gradient(180deg, rgba(124,58,237,0.03) 0%, rgba(59,130,246,0.02) 100%))"/>
</svg>
