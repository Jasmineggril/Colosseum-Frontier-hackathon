<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="load-core"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#3b82f6"/></radialGradient>
    <linearGradient id="pulse-ring" x1="0" x2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { r: 80; opacity: 0.8; } 50% { r: 120; opacity: 0.3; } }
      .spinner { animation: spin 3s linear infinite; }
      .pulser { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#050014" />
  <!-- Outer ring spinner -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#pulse-ring)" stroke-width="12" class="spinner" stroke-opacity="0.4" stroke-dasharray="439.8 219.9"/>
  <!-- Middle pulse ring -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#06b6d4" stroke-width="8" class="pulser" stroke-opacity="0.6"/>
  <!-- Core glow -->
  <circle cx="256" cy="256" r="60" fill="url(#load-core)" opacity="0.95"/>
  <circle cx="256" cy="256" r="50" fill="#06b6d4" opacity="0.5"/>
  <!-- Inner lines -->
  <g stroke="#7c3aed" stroke-width="2" opacity="0.4" class="spinner">
    <line x1="256" y1="120" x2="256" y2="80"/>
    <line x1="320" y1="150" x2="345" y2="125"/>
    <line x1="350" y1="256" x2="390" y2="256"/>
  </g>
  <text x="50%" y="85%" font-family="Orbitron, monospace" font-size="16" fill="#7c3aed" text-anchor="middle" opacity="0.9">SCANNING</text>
</svg>
